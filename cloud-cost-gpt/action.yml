name: 'AWS Cost Analyzer'
description: 'Analyzes AWS spend and optional Infracost estimates to generate cost optimization recommendations.'
author: 'YC'

inputs:
  aws-region:
    description: 'AWS region used for Cost Explorer authentication context.'
    required: true
  openai-api-key:
    description: 'Optional OpenAI API key for narrative summarisation.'
    required: false
  infracost-json:
    description: 'Optional path to an Infracost JSON file generated earlier in the workflow.'
    required: false

outputs:
  report-path:
    description: 'Path to the generated cost report markdown file.'
    value: cost_report.md

runs:
  using: 'docker'
  image: 'Dockerfile'

branding:
  icon: 'dollar-sign'
  color: 'blue'
