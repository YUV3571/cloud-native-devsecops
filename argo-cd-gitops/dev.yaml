apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: shared-app-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/YUV3571/cloud-native-devsecops.git
    targetRevision: main
    path: shared-app/k8s/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
