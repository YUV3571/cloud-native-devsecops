name: Portfolio CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  security-scans:
    name: Security Scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.0
        with:
          version: latest

      - name: Run Trivy
        run: |
          trivy fs . --severity HIGH,CRITICAL

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Checkov
        run: pip install -U checkov

      - name: Run Checkov
        run: checkov -d terraform-iac --framework terraform

  terraform-validate:
    name: Terraform Validate
    needs: security-scans
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      - name: Terraform Format Check
        run: terraform fmt -check -recursive
        working-directory: terraform-iac

      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: terraform-iac

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform-iac

  shared-app-verify:
    name: Shared App Verify
    runs-on: ubuntu-latest
    needs: security-scans
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shared-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: shared-app

      - name: Syntax check
        run: node --check app.js
        working-directory: shared-app

      - name: Build container image
        uses: docker/build-push-action@v6
        with:
          context: ./shared-app
          push: false
          tags: shared-app:ci

  shared-app-release:
    name: Shared App Release
    runs-on: ubuntu-latest
    needs:
      - security-scans
      - shared-app-verify
      - terraform-validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip release]')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check required secrets
        id: release_secrets
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && [ -n "${{ secrets.AWS_REGION }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Explain skip
        if: steps.release_secrets.outputs.configured != 'true'
        run: echo "Skipping shared-app release because AWS deployment secrets are not configured."

      - name: Configure AWS credentials
        if: steps.release_secrets.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: steps.release_secrets.outputs.configured == 'true'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve ECR repository
        if: steps.release_secrets.outputs.configured == 'true'
        id: ecr
        run: |
          repo_uri="$(aws ecr describe-repositories \
            --repository-names cloud-native-devsecops/shared-app \
            --query 'repositories[0].repositoryUri' \
            --output text)"
          echo "repo_uri=$repo_uri" >> "$GITHUB_OUTPUT"

      - name: Build and push shared-app image
        if: steps.release_secrets.outputs.configured == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./shared-app
          push: true
          tags: |
            ${{ steps.ecr.outputs.repo_uri }}:${{ github.sha }}
            ${{ steps.ecr.outputs.repo_uri }}:latest

      - name: Set up kustomize
        if: steps.release_secrets.outputs.configured == 'true'
        uses: imranismail/setup-kustomize@v2

      - name: Update deployment manifests
        if: steps.release_secrets.outputs.configured == 'true'
        run: |
          image_ref="${{ steps.ecr.outputs.repo_uri }}:${{ github.sha }}"
          for overlay in shared-app/k8s/overlays/dev shared-app/k8s/overlays/stage shared-app/k8s/overlays/prod; do
            (
              cd "$overlay"
              kustomize edit set image shared-app="$image_ref"
            )
          done

      - name: Commit manifest update
        if: steps.release_secrets.outputs.configured == 'true'
        run: |
          if git diff --quiet -- shared-app/k8s/overlays; then
            echo "No manifest changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add shared-app/k8s/overlays
          git commit -m "Deploy shared-app image ${{ github.sha }} [skip release]"
          git push origin HEAD:main

  run-cost-analysis:
    name: Run AWS Cost Analysis
    runs-on: ubuntu-latest
    needs: security-scans
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required secrets
        id: cost_secrets
        run: |
          if [ -n "${{ secrets.AWS_ACCESS_KEY_ID }}" ] && [ -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" ] && [ -n "${{ secrets.AWS_REGION }}" ] && [ -n "${{ secrets.OPENAI_API_KEY }}" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS credentials
        if: steps.cost_secrets.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Run AWS Cost Analyzer
        if: steps.cost_secrets.outputs.configured == 'true'
        uses: ./cloud-cost-gpt
        with:
          aws-region: ${{ secrets.AWS_REGION }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

      - name: Explain skip
        if: steps.cost_secrets.outputs.configured != 'true'
        run: echo "Skipping AWS cost analysis because required secrets are not configured."

      - name: Upload Cost Report
        if: steps.cost_secrets.outputs.configured == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cost-report
          path: cost_report.md
